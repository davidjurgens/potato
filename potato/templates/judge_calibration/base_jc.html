<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Judge Calibration{% endblock %} · Potato</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        body {
            font-family: var(--font-sans, system-ui, sans-serif);
            color: var(--foreground, #09090b);
            background: var(--muted, #f4f4f5);
            margin: 0;
        }
        .jc-container { max-width: 920px; margin: 0 auto; padding: var(--space-lg, 1.5rem); }
        .jc-card {
            background: var(--card, #fff);
            border: 1px solid var(--border, #e4e4e7);
            border-radius: var(--radius, 0.5rem);
            padding: var(--space-lg, 1.5rem);
            margin-bottom: var(--space-lg, 1.5rem);
            box-shadow: 0 1px 2px rgba(15,15,25,0.04);
        }
        .jc-card h1 { font-size: 1.4rem; margin: 0 0 .25rem; }
        .jc-card h2 { font-size: 1.05rem; margin: 1.25rem 0 .5rem; }
        .jc-muted { color: var(--muted-foreground, #71717a); font-size: .9rem; }
        label { display:block; font-weight:600; font-size:.85rem; margin:.75rem 0 .25rem; }
        input, select, textarea {
            width: 100%; box-sizing: border-box; padding:.5rem .6rem;
            border:1px solid var(--border,#e4e4e7); border-radius:var(--radius-sm,.375rem);
            font: inherit; background: var(--background,#fff); color: inherit;
        }
        textarea { min-height: 5rem; resize: vertical; }
        .jc-row { display:flex; gap:.75rem; flex-wrap:wrap; }
        .jc-row > div { flex:1; min-width: 140px; }
        .jc-actions { display:flex; gap:.5rem; flex-wrap:wrap; align-items:center; margin-top:1rem; }
        .jc-btn {
            display:inline-block; padding:.55rem 1rem; border:1px solid transparent;
            cursor:pointer; text-decoration:none; line-height:1.25;
            border-radius:var(--radius-sm,.375rem); font:inherit; font-weight:600;
            background: var(--primary, #6e56cf); color: var(--primary-foreground,#fff);
            transition: filter .15s ease, background-color .15s ease;
        }
        .jc-btn:hover { filter: brightness(1.07); }
        .jc-btn:active { filter: brightness(0.94); }
        .jc-btn:focus-visible { outline: 2px solid var(--ring,#6e56cf); outline-offset: 2px; }
        .jc-btn.secondary { background: var(--secondary,#e4e4e7);
                    color: var(--foreground,#09090b); border-color: var(--border,#e4e4e7); }
        .jc-btn:disabled { opacity:.5; cursor:not-allowed; filter:none; }
        @media (prefers-reduced-motion: reduce) { .jc-btn { transition: none; } }
        /* Icon-only remove button: meet the 44x44px touch-target minimum and
           center the glyph. */
        .jc-m-remove { min-width:2.75rem; min-height:2.75rem; line-height:1;
                    display:inline-flex; align-items:center; justify-content:center;
                    font-size:1.1rem; padding:0; }
        .jc-model { border:1px dashed var(--border,#e4e4e7); border-radius:var(--radius-sm,.375rem);
                    padding:.75rem; margin-bottom:.5rem; }
        .jc-progress-track { height:10px; background:var(--muted,#f4f4f5);
                    border-radius:999px; overflow:hidden; margin:.5rem 0; }
        .jc-progress-bar { height:100%; width:0%; background:var(--primary,#6e56cf);
                    transition: width .4s ease; }
        @media (prefers-reduced-motion: reduce) {
            .jc-progress-bar { transition: none; }
        }
        .jc-pill { display:inline-block; padding:.15rem .55rem; border-radius:999px;
                    font-size:.75rem; font-weight:600; background:var(--secondary,#e4e4e7); }
        .jc-error { color: var(--destructive,#dc2626); font-size:.85rem; margin:.5rem 0; white-space:pre-wrap; }
    </style>
</head>
<body>
    <div class="jc-container">
        {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
