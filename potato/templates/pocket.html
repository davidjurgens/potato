<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#5b21b6">
<title>{{ task_name }} — Potato Pocket</title>
<link rel="manifest" href="/pocket/manifest.webmanifest">
<link rel="icon" href="/static/pocket-icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/static/pocket-icon.svg">
<link rel="stylesheet" href="/static/css/pocket.css?v=2">
</head>
<body>
<header class="pk-header">
    <div class="pk-header-row">
        <span class="pk-logo" aria-hidden="true">&#129364;</span>
        <span class="pk-task">{{ task_name }}</span>
        <span class="pk-count" id="pk-count" aria-live="polite"></span>
        <a class="pk-desktop-link" href="/annotate?desktop=1">Desktop site</a>
    </div>
    <div class="pk-progress" role="progressbar" aria-label="Annotation progress"
         aria-valuemin="0" aria-valuemax="100">
        <div class="pk-progress-fill" id="pk-progress"></div>
    </div>
</header>

<main class="pk-main" id="pk-main">
    <div class="pk-loading" id="pk-loading">
        <span class="pk-spinner" aria-hidden="true"></span> Loading your queue&hellip;
    </div>
</main>

<div class="pk-sync" id="pk-sync" hidden></div>

<script>window.pocketTaskName = {{ task_name | tojson }};</script>
<script src="/static/pocket.js?v=1"></script>
</body>
</html>
