<div class="instance-text-container">
    <div id="instance-text" class="instance-text" data-instance-id="{{ instance_id }}">
        {% if has_instance_display | default(false) and (display_html | default('')) %}
        {{ display_html | safe }}
        {% else %}
        <div id="span-overlays"></div>
        <div id="text-content" data-original-text="{{ instance_plain_text | default('') | e }}">{{ instance | safe }}</div>
        {% endif %}
    </div>
</div>
