# additions are welcome via pull request. Keys mirror `ui_lang_defaults` in
# potato/flask_server.py; any key left out falls back to English.
# Placeholders in braces ({n}, {total}, {pct}, {started}) are substituted at
# runtime and must be preserved verbatim.
