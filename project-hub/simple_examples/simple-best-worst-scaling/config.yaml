annotation_task_name: "Sentiment Intensity BWS"

# Data and directories
task_dir: .
data_files:
  - data/sentiment-pool.jsonl
output_annotation_dir: annotation_output/bws/

# Item properties
item_properties:
  id_key: id
  text_key: text

# BWS tuple generation configuration
bws_config:
  tuple_size: 4            # Items per tuple (default: 4)
  num_tuples: null          # Auto-calculate based on min_item_appearances
  seed: 42                  # Random seed for reproducibility
  min_item_appearances: 8   # Each item appears >= N times across tuples
  scoring:
    method: counting        # counting | bradley_terry | plackett_luce

# Annotation schema
annotation_schemes:
  - annotation_type: bws
    name: sentiment_bws
    description: "Sentiment Intensity"
    best_description: "Which sentence expresses the MOST positive sentiment?"
    worst_description: "Which sentence expresses the LEAST positive sentiment?"
    tuple_size: 4
    sequential_key_binding: true

# User settings
user_config:
  allow_all_users: true

# Display settings
site_file: templates/base_template_v2.html
