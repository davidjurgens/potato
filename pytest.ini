[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
# Run core regression tests only (~25% of suite, minutes not hours):
#   pytest tests/selenium/ -m core
# Run everything except redundant tests:
#   pytest tests/selenium/ -m "not redundant"
# Full suite (unchanged):
#   pytest tests/selenium/
# For fast runs, use: pytest -n 4 --ignore=tests/selenium/archived
# For coverage: pytest --cov=potato --cov-report=html:test-results/coverage
timeout = 30
timeout_method = thread
timeout_func_only = true
markers =
    selenium: marks tests as selenium tests (deselect with '-m "not selenium"')
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    serial: marks tests that must run serially (not in parallel)
    core: core regression tests — run with 'pytest tests/selenium/ -m core'
    redundant: tests that duplicate coverage from other test files
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning