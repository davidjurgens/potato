# Task 13: Dependency Tree Annotation
# Port 8013 - Span + span_link for dependency arcs

annotation_task_name: "Dependency Tree Annotation"

data_files:
  - "data/sentences.json"

item_properties:
  id_key: "id"
  text_key: "text"

task_dir: "."
output_annotation_dir: "annotation_output"
output_annotation_format: json

user_config:
  allow_anonymous: true

annotation_schemes:
  - annotation_type: span
    name: tokens
    description: "Highlight individual tokens and assign POS tags"
    labels:
      - name: NOUN
        tooltip: "Nouns (cat, dog, idea)"
        key_value: "n"
      - name: VERB
        tooltip: "Verbs (run, eat, think)"
        key_value: "v"
      - name: ADJ
        tooltip: "Adjectives (big, red, happy)"
        key_value: "a"
      - name: ADV
        tooltip: "Adverbs (quickly, very, well)"
        key_value: "r"
      - name: DET
        tooltip: "Determiners (the, a, this)"
        key_value: "d"
      - name: ADP
        tooltip: "Adpositions/Prepositions (in, on, at)"
        key_value: "p"
      - name: PRON
        tooltip: "Pronouns (he, she, it)"
        key_value: "o"
      - name: PUNCT
        tooltip: "Punctuation (., !, ?)"
        key_value: "."
    sequential_key_binding: false

  - annotation_type: span_link
    name: dependencies
    description: "Create dependency relations between tokens (click head first, then dependent)"
    span_schema: tokens
    link_types:
      - name: nsubj
        directed: true
        color: "#dc2626"
      - name: obj
        directed: true
        color: "#22c55e"
      - name: amod
        directed: true
        color: "#3b82f6"
      - name: advmod
        directed: true
        color: "#8b5cf6"
      - name: det
        directed: true
        color: "#6b7280"
      - name: nmod
        directed: true
        color: "#f59e0b"
      - name: case
        directed: true
        color: "#a855f7"
      - name: punct
        directed: true
        color: "#9ca3af"
      - name: root
        directed: true
        color: "#ef4444"
    visual_display:
      enabled: true
      arc_position: above
      show_labels: true
      multi_line_mode: single_line

debug: true
