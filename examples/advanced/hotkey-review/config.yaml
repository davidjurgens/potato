# Hotkey Review Mode Example
#
# Keyboard-driven rapid review queue: each schema has key bindings, and
# review_mode auto-advances to the next instance the moment the current one
# is complete — press a key, the page moves on. Modeled on the
# keyboard-first review flows of observability annotation queues.
#
# Run from repository root:
#   python potato/flask_server.py start examples/advanced/hotkey-review/config.yaml -p 8000

annotation_task_name: "Hotkey Trace Review"

data_files:
  - data/review-items.json

item_properties:
  id_key: id
  text_key: response

task_dir: .
output_annotation_dir: annotation_output
output_annotation_format: json

# Auto-advance when every schema on the page has a value.
# advance_on: "required" would instead advance when all required schemas
# are filled (useful when optional note fields exist).
review_mode:
  enabled: true
  auto_advance: true
  advance_on: complete
  delay_ms: 350

instance_display:
  layout:
    direction: vertical
    gap: 12px

  fields:
    - key: prompt
      type: text
      label: "Prompt"

    - key: response
      type: text
      label: "Agent Response"

annotation_schemes:
  - annotation_type: radio
    name: verdict
    description: "Verdict (1/2/3)"
    labels:
      - name: good
        tooltip: "Accurate and helpful"
      - name: acceptable
        tooltip: "Usable with minor issues"
      - name: bad
        tooltip: "Wrong, unsafe, or unhelpful"
    sequential_key_binding: true

user_config:
  allow_all_users: true
