# PDF Cross-Page Linking — PAGINATED view
#
# One page is shown at a time with a page-thumbnail browser on the left. Link
# anchors across pages with the pin-navigate flow: select a source anchor, click
# a thumbnail to jump to another page, then select the target. Links whose other
# endpoint is on a page that isn't currently shown display an off-page stub
# ("-> p.N"). Best for long documents.
#
# Compare with the scroll variant: examples/advanced/pdf-link-scroll/
#
# Run from the repo root:
#   python potato/flask_server.py start examples/advanced/pdf-link-paginated/config.yaml -p 8000

annotation_task_name: "PDF Linking — Paginated View"

task_dir: .

data_files:
  - data/documents.json

output_annotation_dir: annotation_output
output_annotation_format: json

media_directory: media

item_properties:
  id_key: id
  text_key: title

instance_display:
  fields:
    - key: pdf
      type: pdf
      label: "Document"
      display_options:
        annotation_mode: link
        view_mode: paginated       # <-- one page at a time
        thumbnail_sidebar: true    # <-- page-thumbnail browser (paginated only)
        max_height: 760
        zoom: page-width
        enable_text_anchors: true
        enable_region_anchors: true
        anchor_schema: pdf_anchors
        link_schema: pdf_links
        # Optional OCR for scanned/image-only PDFs (off by default; needs tesseract):
        # ocr: auto
        anchor_labels:
          - name: claim
            color: "#dc2626"
          - name: figure
            color: "#2563eb"
          - name: citation
            color: "#059669"
        link_types:
          - name: refers_to
            directed: true
            color: "#dc2626"
            allowed_source_labels: [claim]
            allowed_target_labels: [figure]
          - name: same_as
            directed: false
            color: "#7c3aed"
          - name: supports
            directed: true
            color: "#059669"

annotation_schemes:
  - annotation_type: radio
    name: doc_quality
    description: "Overall, are this document's cross-references internally consistent?"
    horizontal: true
    labels:
      - name: consistent
      - name: inconsistent
      - name: unsure

user_config:
  allow_all_users: true

alert_time_each_instance: 100000000
