port: 8000
annotation_task_name: Memos Example
task_dir: .
output_annotation_dir: annotation_output/memos-example/
output_annotation_format: tsv
data_files:
- data/memos-example.json
item_properties:
  id_key: id
  text_key: text
user_config:
  allow_all_users: true
  users: []
alert_time_each_instance: 10000000

# Enable the universal Memos sidebar. Default visibility is private
# (author + admins). Set to "shared" only for collaborative coding —
# see docs/advanced/memos.md for the inter-annotator bias caution.
annotation_ui:
  memos: true
  visibility: private

annotation_schemes:
- annotation_type: radio
  name: sentiment
  description: What is the overall sentiment of this text?
  labels:
  - positive
  - neutral
  - negative
  sequential_key_binding: true
site_dir: default
