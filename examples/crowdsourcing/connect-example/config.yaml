# CloudResearch Connect Example Configuration
#
# Deploy a Potato task on Connect (connect.cloudresearch.com) — the platform
# CloudResearch migrates MTurk requesters to.
# See docs/deployment/connect_integration.md for the full guide.
#
# In Connect, set your project link to your Potato server; Connect appends
# participantId (and optionally assignmentId/projectId) to the URL.
#
# To test locally, run from the repo root:
#   python potato/flask_server.py start examples/crowdsourcing/connect-example/config.yaml -p 8000
#
# Then simulate a participant arrival:
#   http://localhost:8000/?participantId=TEST123&assignmentId=A1&projectId=P1

port: 9004

annotation_task_name: Connect Annotation Task
task_description: "Classify the sentiment of short text snippets. This task takes about 5 minutes."

login:
  type: url_direct
  url_argument: participantId

crowdsourcing:
  provider: connect
  connect:
    completion:
      code: "CONNECT-CODE-01"
      # If your Connect project uses redirect completion, paste the URL from
      # the project's completion settings instead:
      # redirect_url: "https://connect.cloudresearch.com/participant/project/<project-id>/complete"

hide_navbar: true
jumping_to_id_disabled: true

assignment_strategy: random
max_annotations_per_user: 5
num_annotators_per_item: 3

task_dir: .
output_annotation_dir: annotation_output/connect-example/
output_annotation_format: json

data_files:
  - data/example.json

item_properties:
  id_key: id
  text_key: text

user_config:
  allow_all_users: true
  users: []

annotation_schemes:
  - annotation_type: radio
    name: sentiment
    description: "What is the sentiment expressed in this text?"
    labels:
      - name: positive
        tooltip: "The text expresses positive feelings or opinions"
      - name: neutral
        tooltip: "The text is neutral or factual without clear sentiment"
      - name: negative
        tooltip: "The text expresses negative feelings or opinions"
    sequential_key_binding: true

site_dir: default
