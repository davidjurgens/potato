annotation_task_name: Machine Translation Post-Editing
task_dir: .
output_annotation_dir: annotation_output/text-edit/
output_annotation_format: json
annotation_codebook_url: ''
data_files:
- data/text-edit-example.json
item_properties:
  id_key: id
  text_key: text
user_config:
  allow_all_users: true
