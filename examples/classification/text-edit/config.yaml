alert_time_each_instance: 10000000
annotation_schemes:
- annotation_type: text_edit
  name: post_edit
  description: "Edit the machine translation output to produce a fluent, accurate translation"
  source_field: mt_output
  show_diff: true
  show_edit_distance: true
  allow_reset: true
site_dir: default
