# Live coding-agent example via the DockerCodingAgentProxy.
#
# Identical to coding-agent-live-test/, but every action runs inside an
# ephemeral Docker container with --network=none, --memory, --cpus,
# --read-only and a writable workspace bind-mounted at /work. Real
# isolation -- safe to point at less trusted planner outputs.
#
# Prerequisites:
#   docker pull python:3.11-slim   # or your own image
#   ollama pull llama3.2:3b        # planner
#   ollama pull gemma4:e4b         # rater
#
# Pair with: tests/smoke/run_docker_coding_agent_sim.py

annotation_task_name: "Live Coding Agent (Docker sandbox)"

data_files:
  - data/tasks.json

item_properties:
  id_key: id
  text_key: task_description

task_dir: .
output_annotation_dir: annotation_output
output_annotation_format: json

agent_proxy:
  type: docker_coding
  llm:
    endpoint_type: ollama
    model: llama3.2:3b
    base_url: http://localhost:11434
    temperature: 0.2
    max_tokens: 600
  execution:
    per_step_timeout: 12     # +overhead for container start
    max_output_chars: 2000
  docker:
    image: python:3.11-slim
    memory: 256m
    cpus: 1.0
    network: none
  sandbox:
    max_steps: 8
    max_session_seconds: 300
    request_timeout_seconds: 60
    rate_limit_per_minute: 30

instance_display:
  layout:
    direction: vertical
    gap: 16px

  fields:
    - key: task_description
      type: text
      label: "Coding Task"

    - key: conversation
      type: interactive_chat
      label: "Live Coding Agent (Dockerized)"
      display_options:
        show_turn_numbers: true

annotation_schemes:
  - annotation_type: radio
    name: task_success
    description: "Did the agent complete the task?"
    labels:
      - name: success
      - name: partial
      - name: failure

  - annotation_type: likert
    name: code_quality
    description: "Quality of the generated code"
    size: 5
    min_label: "Bad"
    max_label: "Excellent"

  - annotation_type: text
    name: notes
    description: "Notes"

user_config:
  allow_all_users: true
