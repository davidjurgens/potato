# Simulator Configuration: Agent strategy with Ollama Gemma3 (vision)
#
# Uses a local vision-capable LLM (via Ollama) to read multi-modal /
# structured agent-trace content -- task description, dialogue array,
# metadata table, image fields -- and produce a batched annotation set
# for every schema in the instance.
#
# Prerequisites:
#   1. Install Ollama: https://ollama.ai
#   2. Pull a vision-capable model:
#        ollama pull gemma4:e4b
#      (or another vision-capable model: llava, llama3.2-vision, qwen2.5-vl)
#   3. Start Ollama server: ollama serve (default port 11434)
#
# Usage:
#   # Terminal 1 -- start the annotation server with an agent-trace example:
#   python potato/flask_server.py start \
#       examples/agent-traces/agent-trace-evaluation/config.yaml -p 8520
#
#   # Terminal 2 -- run the simulator:
#   python -m potato.simulator \
#       --config examples/simulator-configs/simulator-agent-trace-ollama.yaml \
#       --server http://localhost:8520

simulator:
  users:
    count: 2  # Few users -- one VLM call per instance is the bottleneck
    competence_distribution:
      # PERFECT == always trust the VLM output (no random noise injection)
      perfect: 1.0

  strategy: agent

  agent_config:
    endpoint_type: ollama_vision
    model: gemma4:e4b
    base_url: http://localhost:11434
    temperature: 0.0
    max_tokens: 800
    max_image_dim: 1024
    max_image_count: 4
    include_dialogue_text: true
    include_spreadsheet: true
    max_dialogue_chars: 12000
    cache_per_instance: true   # one LLM call per instance, all schemas batched
    add_noise: false
    noise_rate: 0.0

  timing:
    annotation_time:
      min: 1.0
      max: 5.0
      mean: 2.0
      std: 1.0
      distribution: normal

  execution:
    parallel_users: 1          # VLM throughput is the bottleneck
    delay_between_users: 1.0
    max_annotations_per_user: 10

  output:
    dir: simulator_output_agent_trace
    format: json

# Note: if Ollama is not reachable or the model is not pulled, the strategy
# falls back to RandomStrategy and the simulator will still complete --
# accuracy will be at chance level instead of model-driven.
