# Simulator Configuration: Coding-agent code_review labeling
#
# Targets examples/agent-traces/coding-agent-review/. The example uses
# the `code_review` annotation type which captures verdict + per-file
# comments + per-file ratings as a structured JSON blob.
#
# Prerequisites:
#   ollama pull gemma4:e4b
#
# Usage:
#   python potato/flask_server.py start \
#       examples/agent-traces/coding-agent-review/config.yaml -p 8526
#   python tests/smoke/run_coding_agent_review_sim.py

simulator:
  users:
    count: 1
    competence_distribution:
      perfect: 1.0

  strategy: agent

  agent_config:
    endpoint_type: ollama_vision
    model: gemma4:e4b
    base_url: http://localhost:11434
    temperature: 0.0
    max_tokens: 1200       # code reviews need more output tokens
    max_dialogue_chars: 16000
    cache_per_instance: true
    add_noise: false

  timing:
    annotation_time:
      min: 1.0
      max: 5.0
      mean: 2.0
      std: 1.0
      distribution: normal

  execution:
    parallel_users: 1
    delay_between_users: 1.0
    max_annotations_per_user: 3

  output:
    dir: simulator_output_coding_agent_review
    format: json
