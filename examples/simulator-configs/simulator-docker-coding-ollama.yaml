# Simulator Configuration: drive the Docker coding-agent end-to-end.
# Same shape as simulator-live-coding-ollama.yaml; pair it with the
# Docker example.

simulator:
  users:
    count: 1
    competence_distribution:
      perfect: 1.0

  strategy: agent

  agent_config:
    endpoint_type: ollama_vision
    model: gemma4:e4b
    base_url: http://localhost:11434
    temperature: 0.0
    max_tokens: 600
    cache_per_instance: true
    add_noise: false

  interactive:
    enabled: true
    endpoint_type: ollama
    model: llama3.2:3b
    base_url: http://localhost:11434
    temperature: 0.4
    max_tokens: 200
    max_turns: 4
    persona_system_prompt: |
      You are a developer testing a coding assistant. Briefly tell the
      assistant what you want done in one or two sentences. Acknowledge
      the result and end your message with the marker [DONE] when done.
    done_marker: "[DONE]"
    first_message_template: "Please help me with this coding task: {task}"

  timing:
    annotation_time:
      min: 1.0
      max: 5.0
      mean: 2.0
      std: 1.0
      distribution: normal

  execution:
    parallel_users: 1
    delay_between_users: 1.0
    max_annotations_per_user: 2

  output:
    dir: simulator_output_docker_coding
    format: json
