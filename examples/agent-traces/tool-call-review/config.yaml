annotation_task_name: "Tool-Call Review"
data_files: [data/traces.json]
item_properties: {id_key: id, text_key: task}
task_dir: .
output_annotation_dir: annotation_output
output_annotation_format: json
instance_display:
  layout: {direction: vertical, gap: 16px}
  fields:
    - {key: task, type: text, label: "Task"}
    - {key: steps, type: agent_trace, label: "Trace", display_options: {speaker_key: agent, text_key: content}}
annotation_schemes:
  - annotation_type: tool_call_review
    name: tool_review
    description: "Judge each tool call: right tool? correct arguments?"
    steps_key: steps
