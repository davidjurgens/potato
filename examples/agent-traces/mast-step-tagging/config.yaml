# MAST tagging at step granularity (M4)
# Recipe: the existing per-step trajectory_eval schema, with the 14 MAST failure
# modes as the per-step error taxonomy — so annotators bind MAST tags to the exact
# step (and thus the acting agent) where each failure occurred, rather than tagging
# the trace as a whole. Pair with failure_attribution (M1) for the responsible-agent
# decision and handoff_review (M2) for inter-agent edges.
# Run: python potato/flask_server.py start examples/agent-traces/mast-step-tagging/config.yaml -p 8000
annotation_task_name: "MAST Step Tagging"
data_files:
  - data/traces.json
item_properties:
  id_key: id
  text_key: task
task_dir: .
output_annotation_dir: annotation_output
output_annotation_format: json
instance_display:
  layout: {direction: vertical, gap: 16px}
  fields:
    - key: task
      type: text
      label: "Task"
    - key: steps
      type: agent_trace
      label: "Agent Interactions"
      display_options: {show_turn_numbers: true, speaker_key: agent, text_key: content}
annotation_schemes:
  - annotation_type: trajectory_eval
    name: mast_steps
    description: "Tag each step with the MAST failure mode(s) it exhibits."
    steps_key: steps
    step_text_key: content
    correctness_options: [correct, flawed]
    error_types:
      - name: "Specification & System Design"
        subtypes:
          - "1.1 Disobey task specification"
          - "1.2 Disobey role specification"
          - "1.3 Step repetition"
          - "1.4 Loss of conversation history"
          - "1.5 Unaware of termination conditions"
      - name: "Inter-Agent Misalignment"
        subtypes:
          - "2.1 Conversation reset"
          - "2.2 Fail to ask for clarification"
          - "2.3 Task derailment"
          - "2.4 Information withholding"
          - "2.5 Ignored other agent's input"
          - "2.6 Reasoning-action mismatch"
      - name: "Task Verification & Termination"
        subtypes:
          - "3.1 Premature termination"
          - "3.2 No or incomplete verification"
          - "3.3 Incorrect verification"
