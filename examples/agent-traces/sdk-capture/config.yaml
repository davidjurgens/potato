# SDK Capture — receive traces from the potato_trace SDK
#
# Runs a Potato server with trace ingestion enabled. Point the potato_trace SDK
# (see agent.py) at this server and traced agent runs arrive here for evaluation.
#
# 1. Start the server (from repo root):
#      python potato/flask_server.py start examples/agent-traces/sdk-capture/config.yaml -p 8000
# 2. In another shell, run a traced agent that sends here:
#      POTATO_TRACE_URL=http://localhost:8000 python examples/agent-traces/sdk-capture/agent.py
# 3. Annotate the captured runs in the Potato UI.

annotation_task_name: "SDK Capture — Agent Traces"

# Seed trace so the task loads with data; SDK runs arrive at runtime.
data_files:
  - data/seed.json

item_properties:
  id_key: id
  text_key: task_description

task_dir: .
output_annotation_dir: annotation_output
output_annotation_format: json

# Receive traces from the potato_trace SDK (POST /api/traces/webhook).
trace_ingestion:
  enabled: true
  api_key: ""            # no auth for the demo; set a key in production
  notify_annotators: true

instance_display:
  layout:
    direction: vertical
    gap: 12px
  fields:
    - key: task_description
      type: text
      label: "Task"
    - key: trace
      type: eval_trace
      label: "Agent Trace"

annotation_schemes:
  - annotation_type: radio
    name: trajectory_correct
    description: "Is the agent trajectory correct overall?"
    labels:
      - name: correct
      - name: incorrect
    sequential_key_binding: true
