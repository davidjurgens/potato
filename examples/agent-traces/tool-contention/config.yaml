# Tool / resource-contention timeline (M8)
# Per-agent lanes of concurrent tool calls; flag shared-resource contentions.
# Run: python potato/flask_server.py start examples/agent-traces/tool-contention/config.yaml -p 8000
annotation_task_name: "Tool Contention Review"
data_files:
  - data/runs.json
item_properties:
  id_key: id
  text_key: task
task_dir: .
output_annotation_dir: annotation_output
output_annotation_format: json
instance_display:
  layout: {direction: vertical, gap: 16px}
  fields:
    - key: task
      type: text
      label: "Scenario"
annotation_schemes:
  - annotation_type: tool_contention
    name: contention
    description: "Classify each shared-resource contention region."
    calls_key: calls
    agent_key: agent
    resource_key: resource
    contention_labels: [deadlock, circular_wait, race_condition, benign]
