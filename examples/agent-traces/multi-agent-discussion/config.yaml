# Multi-Agent Discussion Example
#
# Demonstrates annotation of discussions BETWEEN multiple agents (3-4 agents
# coordinating/debating), combining:
#
#   - multi_agent_discussion display: agent legend with deterministic colors,
#     addressee chips ("→ critic"), reply threading, click-to-filter agents
#   - consensus_tracking schema: tag turns with discussion acts
#     (proposal/agreement/disagreement/decision/concession) and link
#     responses to the proposal turn they reference
#   - turn-level bindings (Phase A framework): per-turn contribution rating
#     on specific agents only
#   - whole-trace outcome schemas alongside the per-turn ones
#
# The data is synthetic AutoGen-style output run through the canonical trace
# format (agent_id/addressee populated by the multi_agent converter).
#
# Run from repository root:
#   python potato/flask_server.py start examples/agent-traces/multi-agent-discussion/config.yaml -p 8000

annotation_task_name: "Multi-Agent Discussion Review"

data_files:
  - data/discussions.json

item_properties:
  id_key: id
  text_key: task_description

task_dir: .
output_annotation_dir: annotation_output
output_annotation_format: json

instance_display:
  layout:
    direction: vertical
    gap: 16px

  fields:
    - key: task_description
      type: text
      label: "Task"

    - key: conversation
      type: multi_agent_discussion
      label: "Agent Discussion"
      display_options:
        show_turn_numbers: true
        show_legend: true
        show_addressees: true
        thread_replies: true

annotation_schemes:
  # Discussion structure: tag acts + link responses to proposals
  - annotation_type: consensus_tracking
    name: discussion_acts
    description: "Tag the discussion structure"
    turns_key: conversation

  # Per-turn contribution quality on the worker agents only (Phase A binding)
  - annotation_type: likert
    name: contribution_quality
    description: "Contribution quality"
    min_label: "Off-topic"
    max_label: "Decisive"
    size: 5
    turn_level: true
    turn_binding:
      field: conversation
      agents: [planner, researcher, critic]

  # Whole-trace outcome
  - annotation_type: radio
    name: consensus_reached
    description: "Did the agents reach a sound consensus?"
    labels:
      - name: sound_consensus
        tooltip: "Agreed on a well-justified answer"
      - name: premature_consensus
        tooltip: "Agreed too quickly without resolving objections"
      - name: unresolved
        tooltip: "Ended without genuine agreement"
      - name: groupthink
        tooltip: "Dissent was suppressed rather than addressed"
    sequential_key_binding: true

  - annotation_type: radio
    name: coordination_quality
    description: "Overall coordination quality"
    labels: [effective, adequate, poor]
    sequential_key_binding: true

  - annotation_type: text
    name: notes
    description: "Notes on the discussion dynamics"

user_config:
  allow_all_users: true
