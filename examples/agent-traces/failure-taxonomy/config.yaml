# Agent Failure-Mode Taxonomy (MAST)
#
# Tag *why* a multi-agent trace failed using the MAST taxonomy
# (Multi-Agent System failure taxonomy, Cemri et al. 2025) — 14 failure modes
# across 3 categories, shipped built-in via `taxonomy_preset: mast`. Each mode's
# definition appears as a hover tooltip (ⓘ) so annotators apply them consistently.
#
# Run from repository root:
#   python potato/flask_server.py start examples/agent-traces/failure-taxonomy/config.yaml -p 8000

annotation_task_name: "Agent Failure-Mode Taxonomy (MAST)"

data_files:
  - data/failure-traces.json

item_properties:
  id_key: id
  text_key: task

task_dir: .
output_annotation_dir: annotation_output
output_annotation_format: json

instance_display:
  layout:
    direction: vertical
    gap: 16px
  fields:
    - key: task
      type: text
      label: "Task"
    - key: steps
      type: agent_trace
      label: "Agent Interactions"
      display_options:
        show_turn_numbers: true
        speaker_key: agent
        text_key: content

annotation_schemes:
  # Did the system as a whole fail? (gates whether failure modes apply)
  - annotation_type: radio
    name: outcome
    description: "Did the multi-agent system succeed at the task?"
    labels:
      - name: success
        tooltip: "Task fully and correctly completed"
      - name: failure
        tooltip: "Task not completed, or completed incorrectly"
    sequential_key_binding: true

  # The flagship: the built-in MAST taxonomy. No need to hand-author 14 modes.
  - annotation_type: hierarchical_multiselect
    name: failure_modes
    description: "Tag every MAST failure mode this trace exhibits (hover ⓘ for definitions)"
    taxonomy_preset: mast
    show_search: true

  - annotation_type: text
    name: rationale
    description: "Briefly justify the failure modes you selected (which step, why)"
    textarea:
      on: true
      rows: 3
