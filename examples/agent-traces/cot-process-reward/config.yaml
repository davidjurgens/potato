# Chain-of-Thought Process Reward — LLM pre-label + human verify
#
# Segments a long chain-of-thought (CoT) reasoning trace into per-step cards,
# lets an external LLM pre-label each step's process reward (correct / neutral /
# incorrect), and has a human verify or override each suggestion. Built for the
# tall, vertical shape of long reasoning: a sticky step rail, collapsible steps,
# and "jump to next unverified".
#
# Run from the repository root:
#   python potato/flask_server.py start examples/agent-traces/cot-process-reward/config.yaml -p 8000
#
# To enable the "AI pre-label steps" button, point ai_support at a reachable
# endpoint (uncomment the ai_support block below). Without it, the display,
# segmentation, and manual per-step labeling all still work.

annotation_task_name: "Chain-of-Thought Process Reward"

data_files:
  - data/cot-traces.jsonl

item_properties:
  id_key: id
  text_key: question

task_dir: .
output_annotation_dir: annotation_output
output_annotation_format: json

# Split the long `reasoning` string into a list of steps written to `cot_steps`.
# `strategy: auto` tries markers -> numbered -> blank lines -> sentences.
cot_segmentation:
  source_key: reasoning
  strategy: auto
  target_key: cot_steps
  min_step_chars: 30

instance_display:
  layout:
    direction: vertical
    gap: 16px
  fields:
    - key: question
      type: text
      label: "Problem"
    - key: cot_steps
      type: cot_trace
      label: "Model reasoning (verify each step)"
      display_options:
        show_rail: true
        collapse_long_steps: true
        clamp_lines: 10

annotation_schemes:
  - annotation_type: process_reward
    name: step_rewards
    description: "Verify the reward for each reasoning step: ✓ correct, ○ neutral, ✗ incorrect"
    steps_key: cot_steps
    mode: per_step
    allow_neutral: true       # PRM800K-style 3-way (+1 / 0 / -1)
    inline_with_trace: true   # controls sit on each step in the cot_trace display
    ai_prelabel: true         # show the ✨ "AI pre-label steps" button
    require_verification: true

  - annotation_type: radio
    name: final_answer_correct
    description: "Is the final answer correct?"
    labels:
      - name: "yes"
      - name: "no"

# Uncomment and point at a reachable endpoint to enable LLM pre-labeling.
# The judge raises max_tokens automatically for long CoT step verdicts.
#
# ai_support:
#   enabled: true
#   endpoint_type: openai        # openai | ollama | anthropic | vllm | gemini ...
#   ai_config:
#     model: gpt-4o-mini
#     max_tokens: 768
#     temperature: 0.1
#     # base_url: http://localhost:8000/v1   # for vLLM / llama.cpp / local
#     # api_key: EMPTY

user_config:
  allow_all_users: true
