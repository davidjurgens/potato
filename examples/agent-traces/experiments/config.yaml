# Datasets & Experiments — versioned eval sets + experiment runs
#
# Enables Potato's evaluation backbone: versioned datasets of examples and
# experiment runs that score agent outputs with programmatic evaluators
# (trajectory match, tool-use, LLM-judge, heuristics). Manage everything from
# the admin dashboard → "Datasets & Experiments", or via the JSON API.
#
# Run from repository root:
#   python potato/flask_server.py start examples/agent-traces/experiments/config.yaml -p 8000
#
# Then open the admin dashboard and click "Datasets & Experiments".

annotation_task_name: "Agent Eval — Datasets & Experiments"

data_files:
  - data/experiments-example.json

item_properties:
  id_key: id
  text_key: task_description

task_dir: .
output_annotation_dir: annotation_output
output_annotation_format: json

# --- Datasets / Experiments ----------------------------------------------
# storage: "file" (default, git-diffable JSONL snapshots under
# annotation_output/eval_store/) or "sqlite" (single datasets.sqlite for
# large dataset/experiment counts).
datasets:
  enabled: true
  storage: file

annotation_schemes:
  - annotation_type: radio
    name: trajectory_correct
    description: "Is the agent trajectory correct overall?"
    labels:
      - name: correct
      - name: incorrect
    sequential_key_binding: true
