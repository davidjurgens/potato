# Interleaved multimodal reasoning (M15)
# Rate each step of a text/image/tool reasoning trace for coherence + visual grounding.
# Run: python potato/flask_server.py start examples/agent-traces/multimodal-reasoning/config.yaml -p 8000
annotation_task_name: "Multimodal Reasoning Review"
data_files:
  - data/traces.json
item_properties:
  id_key: id
  text_key: task
task_dir: .
output_annotation_dir: annotation_output
output_annotation_format: json
instance_display:
  layout: {direction: vertical, gap: 16px}
  fields:
    - key: task
      type: text
      label: "Task"
annotation_schemes:
  - annotation_type: multimodal_reasoning
    name: reasoning_review
    description: "Judge each step: is the reasoning coherent and the visual grounded (not hallucinated)?"
    steps_key: steps
    type_key: type
    verdict_options: [coherent, incoherent, visual_hallucination, uncertain]
