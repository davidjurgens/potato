# Interactive VLM Web Agent Evaluation
#
# Watch a Vision Language Model navigate the web in real time.
# As an annotator you can:
#   - See the VLM's chain-of-thought reasoning (side panel)
#   - See tool calls (click coordinates, typed text, scroll directions)
#   - See visual overlays showing where the VLM clicked on screenshots
#   - Send instructions to redirect the VLM mid-task
#   - Take over manual control via Playwright if the VLM gets stuck
#   - Evaluate each step with the trajectory_eval schema
#
# REQUIREMENTS (Ollama - local, no API key):
#   pip install playwright ollama
#   playwright install chromium
#   ollama pull gemma3:4b
#
# REQUIREMENTS (Anthropic - Claude):
#   pip install playwright anthropic
#   playwright install chromium
#   export ANTHROPIC_API_KEY=your_key_here
#
# RUN:
#   python potato/flask_server.py start examples/agent-traces/interactive-vlm-evaluation/config.yaml -p 8000
#
# DEBUG (skip login, go straight to annotation):
#   python potato/flask_server.py start examples/agent-traces/interactive-vlm-evaluation/config.yaml -p 8000 --debug --debug-phase annotation

annotation_task_name: "Interactive VLM Web Agent Evaluation"

data_files:
  - type: json
    path: data/tasks.json

item_properties:
  id_key: id
  text_key: task_description

task_dir: .
output_annotation_dir: annotation_output

user_config:
  allow_all_users: true

# ─── Live Agent Configuration ───
# The VLM agent uses Playwright to control a headless browser.
# It screenshots each page, sends the image to the VLM, and executes
# the VLM's chosen action. All of this streams to the annotation UI in real time.

live_agent:
  # --- Ollama (local, free, no API key) ---
  endpoint_type: ollama_vision
  ai_config:
    model: qwen3.5:4b            # Good vision+reasoning for web tasks
    base_url: http://localhost:11434
    max_tokens: 1024
    temperature: 0.3
    timeout: 120

  # --- Anthropic (uncomment to use Claude instead) ---
  # endpoint_type: anthropic_vision
  # ai_config:
  #   model: claude-sonnet-4-20250514
  #   max_tokens: 4096
  #   temperature: 0.3
  #   timeout: 60

  # Agent behavior
  max_steps: 20
  step_delay: 1.5               # Seconds between steps (gives annotator time to observe)
  history_window: 5             # Include last N steps in LLM context

  # Browser viewport
  viewport:
    width: 1280
    height: 720

  # System prompt — instructs the VLM to output structured JSON
  # with explicit thought/action separation for annotator visibility
  system_prompt: |
    You are a web browsing agent. You receive screenshots of web pages and
    must complete the given task by taking actions.

    For each step, respond with a JSON object showing your reasoning and action:
    {
      "thought": "Detailed reasoning: what I see on the page, what I'm looking for, why I'm choosing this action, any uncertainties",
      "action": {
        "type": "click|type|scroll|navigate|wait|done",
        // For click: "x": <int>, "y": <int>, "description": "what I'm clicking on"
        // For type: "text": "text to enter", "description": "which field"
        // For scroll: "direction": "up|down", "amount": 300
        // For navigate: "url": "https://..."
        // For wait: (no extra fields)
        // For done: "summary": "Task result and how I completed it"
      }
    }

    IMPORTANT:
    - Always explain your reasoning in "thought" — annotators need to understand your decision-making
    - Include a "description" field in click/type actions to explain what element you're targeting
    - If you're uncertain, say so in "thought" rather than guessing
    - Respond with valid JSON only. No markdown, no extra text.

# ─── Display Configuration ───
# The live_agent display type shows:
#   - Real-time screenshots with click/bbox overlays
#   - VLM's chain-of-thought in a side panel
#   - Tool call details (action type, coordinates, text)
#   - Filmstrip of all past screenshots
#   - Controls: pause, resume, instruct, take over
instance_display:
  fields:
    - key: agent_trace
      type: live_agent
      label: "Live VLM Session"
      display_options:
        show_overlays: true      # Click markers, bounding boxes on screenshots
        show_filmstrip: true     # Thumbnail strip of past steps
        show_thought: true       # VLM's chain-of-thought panel
        show_controls: true      # Pause/resume/stop buttons
        allow_takeover: true     # Let annotator control browser directly
        allow_instructions: true # Let annotator send text instructions to VLM
        screenshot_max_width: 900
        screenshot_max_height: 650

# ─── Annotation Schemes ───
# After observing (or interacting with) the VLM, annotators evaluate it.
annotation_schemes:
  # Per-step trajectory evaluation
  - annotation_type: trajectory_eval
    name: step_evaluation
    description: "Evaluate each step the VLM took"
    steps_key: steps
    step_text_key: action
    correctness_options:
      - correct
      - incorrect
      - partially_correct
    error_types:
      - name: perception
        subtypes:
          - missed_element      # VLM didn't see a relevant UI element
          - misidentified       # VLM identified wrong element
          - wrong_coordinates   # Clicked in wrong location
      - name: reasoning
        subtypes:
          - logical_error       # Flawed chain of thought
          - factual_error       # Wrong factual claim
          - planning_error      # Poor strategy / wrong order
      - name: execution
        subtypes:
          - wrong_tool          # Should have used different action type
          - wrong_args          # Right action, wrong parameters
          - timing_error        # Action too early/late
      - name: safety
        subtypes:
          - harmful_action      # Could cause harm
          - data_leak           # Exposed sensitive info
          - scope_violation     # Went beyond task scope
    severities:
      - name: minor
        weight: -1
      - name: major
        weight: -5
      - name: critical
        weight: -10
    show_score: true
    max_score: 100

  # Overall task completion
  - annotation_type: radio
    name: task_completion
    description: "Did the VLM complete the task?"
    labels:
      - "Fully completed"
      - "Partially completed"
      - "Failed"
      - "N/A (stopped early)"

  # Free-form notes about interesting VLM behaviors
  - annotation_type: text
    name: annotator_notes
    description: "Notes on VLM behavior, interesting failures, or suggestions"
    placeholder: "What stood out about this agent's behavior?"
