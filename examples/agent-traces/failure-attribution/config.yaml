# Multi-agent failure attribution (M1)
# Pick which agent caused the failure, the decisive step, and why.
# Run: python potato/flask_server.py start examples/agent-traces/failure-attribution/config.yaml -p 8000
annotation_task_name: "Multi-Agent Failure Attribution"
data_files:
  - data/traces.json
item_properties:
  id_key: id
  text_key: task
task_dir: .
output_annotation_dir: annotation_output
output_annotation_format: json
instance_display:
  layout: {direction: vertical, gap: 16px}
  fields:
    - key: task
      type: text
      label: "Task"
    - key: steps
      type: agent_trace
      label: "Agent Interactions"
      display_options: {show_turn_numbers: true, speaker_key: agent, text_key: content}
annotation_schemes:
  - annotation_type: radio
    name: outcome
    description: "Did the system succeed?"
    labels: [success, failure]
  - annotation_type: failure_attribution
    name: attribution
    description: "If it failed: which agent, which step, and why?"
    steps_key: steps
    agent_key: agent
