# GUI / computer-use trajectory (M11)
# Per-step screenshot + action; judge action correctness and click grounding.
# Run: python potato/flask_server.py start examples/agent-traces/gui-trajectory/config.yaml -p 8000
annotation_task_name: "GUI Agent Trajectory Review"
data_files:
  - data/traces.json
item_properties:
  id_key: id
  text_key: task
task_dir: .
output_annotation_dir: annotation_output
output_annotation_format: json
instance_display:
  layout: {direction: vertical, gap: 16px}
  fields:
    - key: task
      type: text
      label: "Task"
annotation_schemes:
  - annotation_type: gui_trajectory
    name: gui_review
    description: "For each step: was the action correct and did the click land on the right element?"
    steps_key: steps
    screenshot_key: screenshot
    action_key: action
    coord_space: normalized
    verdict_options: [correct, wrong_element, wrong_action, hallucinated]
