# Potato Demo Space — Agent Trace Evaluation
#
# Showcases Potato's agent trace annotation capabilities with
# multiple schema types: radio, likert, multiselect, span, and text.
#
# Designed for HuggingFace Spaces free tier deployment.

annotation_task_name: "Agent Trace Evaluation Demo"

# Data configuration
data_files:
  - data/demo-traces.json

item_properties:
  id_key: id
  text_key: task_description

# Task directory
task_dir: .
output_annotation_dir: annotation_output
output_annotation_format: json

# Instance Display — shows task, metadata, and agent dialogue
instance_display:
  layout:
    direction: vertical
    gap: 16px

  fields:
    - key: task_description
      type: text
      label: "Task"

    - key: metadata_table
      type: spreadsheet
      label: "Trace Info"
      display_options:
        compact: true
        max_height: 120

    - key: conversation
      type: dialogue
      label: "Agent Trace"
      span_target: true
      display_options:
        show_turn_numbers: true
        alternating_shading: true

# Annotation Schemes — demonstrating multiple types
annotation_schemes:
  # Radio: Task success
  - annotation_type: radio
    name: task_success
    description: "Did the agent complete the task?"
    labels:
      - name: success
        tooltip: "Fully completed correctly"
      - name: partial
        tooltip: "Partially completed or with errors"
      - name: failure
        tooltip: "Not completed"
    sequential_key_binding: true

  # Radio: Side effects
  - annotation_type: radio
    name: side_effects
    description: "Did the agent cause unintended side effects?"
    labels:
      - name: none
        tooltip: "No unintended consequences"
      - name: minor
        tooltip: "Minor unintended effects"
      - name: major
        tooltip: "Significant unintended consequences"
    sequential_key_binding: true

  # Likert: Efficiency
  - annotation_type: likert
    name: efficiency
    description: "How efficient was the agent's approach?"
    min_label: "Very inefficient"
    max_label: "Optimal"
    size: 5

  # Span: Hallucination marking
  - annotation_type: span
    name: hallucination_spans
    description: "Highlight hallucinations or errors in the trace"
    labels:
      - name: hallucination
        tooltip: "Claim not grounded in evidence"
      - name: incorrect_fact
        tooltip: "Factually incorrect statement"

  # Text: Free-form notes
  - annotation_type: text
    name: notes
    description: "Additional notes or observations"

# Open access — no password for demo
require_password: false

user_config:
  allow_all_users: true
