# Potato Demo Space — Audio Emotion Recognition
annotation_task_name: "Audio Classification"

data_files:
  - data/audio.json

item_properties:
  id_key: id
  text_key: audio_url

task_dir: .
output_annotation_dir: annotation_output
output_annotation_format: json

annotation_instructions: |
  <h4>Task: Audio Classification</h4>
  <p>Listen to each audio clip and classify its <strong>genre</strong> and <strong>mood</strong>.</p>
  <p>Use the audio player controls to play, pause, and scrub through the track.</p>

instance_display:
  fields:
    - key: audio_url
      type: audio
      label: "Audio Sample"
      display_options:
        controls: true
    - key: description
      type: text
      label: "Description"
      display_options:
        collapsible: true
  layout:
    direction: vertical
    gap: 16px

annotation_schemes:
  - annotation_type: radio
    name: genre
    description: "What genre best describes this audio?"
    labels:
      - name: electronic
        tooltip: "Synthesizers, digital production, electronic beats"
      - name: ambient
        tooltip: "Atmospheric, textural, background-oriented"
      - name: dance
        tooltip: "Uptempo, rhythmic, designed for movement"
      - name: cinematic
        tooltip: "Dramatic, orchestral, film-score-like"
    sequential_key_binding: true

  - annotation_type: radio
    name: mood
    description: "What is the overall mood?"
    labels:
      - name: energetic
        tooltip: "Upbeat, driving, high-energy"
      - name: calm
        tooltip: "Relaxed, peaceful, soothing"
      - name: neutral
        tooltip: "Neither particularly energetic nor calm"
      - name: intense
        tooltip: "Dark, dramatic, tension-building"
    sequential_key_binding: true

  - annotation_type: likert
    name: production_quality
    description: "Rate the production quality"
    min_label: "Low quality"
    max_label: "High quality"
    size: 5

require_password: false
user_config:
  allow_all_users: true
site_dir: default

custom_footer_html: |
  <div class="potato-promo-banner">
    <p class="promo-headline">This demo was built with Potato</p>
    <p>Potato is a free, open-source annotation platform with 20+ annotation types, AI-assisted labeling, and quality control. Set up your own annotation project in minutes with a single YAML config file.</p>
    <div class="promo-links">
      <a href="https://potatoannotator.com/" target="_blank" rel="noopener noreferrer" class="promo-link promo-link-primary">
        <i class="fas fa-globe"></i> potatoannotator.com
      </a>
      <a href="https://github.com/davidjurgens/potato" target="_blank" rel="noopener noreferrer" class="promo-link promo-link-outline">
