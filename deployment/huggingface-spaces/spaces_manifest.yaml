# Potato HuggingFace Spaces — catalog manifest
# =============================================
# Single source of truth for every Potato demo Space.
#
# Each entry stamps out a self-contained, push-ready HF Space (Docker SDK, port 7860)
# from an existing examples/ project. To add a Space later: add one entry here, then run
#   python deployment/huggingface-spaces/build_space.py <id>
#   bash   deployment/huggingface-spaces/deploy_space.sh <id> <hf-org>
#
# Per-entry fields:
#   id         (required) Space repo name (kebab-case). Becomes <org>/<id> on HF.
#   source     (required) Path (repo-relative) to the examples/ project: must hold config.yaml + data/.
#   title      (required) HF Space display title (README frontmatter).
#   summary    (required) One-line description (README body + collection card).
#   category   (required) Grouping for the docs index / collection.
#   tags       (optional) Extra HF tags (always merged with: annotation, potato, + category).
#   emoji      (optional) HF Space emoji. Default: 🥔
#   color_from / color_to (optional) HF gradient. Default: yellow / yellow.
#   needs_lfs  (optional) true if data/ carries media (mp4/webm/wav/mp3/png/jpg/pdf) → .gitattributes.
#   needs_ai   (optional) true if the demo calls an LLM at annotation time → wire to HF Inference API
#              (HF_TOKEN) before deploy; lower priority wave.
#   status     (optional) "gated" = deploy only if it renders from bundled static data (Phase 2
#              boot-check is the gate); otherwise local-only, not a Space. Default: "ready".

defaults:
  emoji: "🥔"
  color_from: yellow
  color_to: yellow
  license: apache-2.0
  needs_lfs: false
  needs_ai: false
  status: ready

